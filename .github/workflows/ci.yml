name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  test-build-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Secret scan (gitleaks OSS)
        uses: docker://zricethezav/gitleaks:v8.28.0
        with:
          args: dir /github/workspace --redact --exit-code 1

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: |
          python -m pip install --upgrade pip
          python -m pip install uv

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run python -m pytest

      - name: Compile source
        run: uv run python -m compileall src

      - name: Build package
        run: uv build

      - name: Verify dist metadata
        run: |
          python -m pip install --upgrade pip
          python -m pip install twine
          twine check dist/*
